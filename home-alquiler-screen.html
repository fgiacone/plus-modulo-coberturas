    <main class="ok-home">

                src="./assets/ico-shield1-select.svg"
                data-icon-default="./assets/ico-shield1.svg"
                data-icon-selected="./assets/ico-shield1-select.svg"
                alt=""
                aria-hidden="true"
              />
              <span class="home-coverage-card__chevron" aria-hidden="true"></span>
            </header>

            <div class="home-coverage-card__tag home-coverage-card__tag--warning">
              <span aria-hidden="true">!</span>

              <span class="home-coverage-card__details">Detalles</span>

            <strong class="home-coverage-card__included">Incluido</strong>

          <button

            type="button"
            role="radio"
            aria-checked="false"
            data-home-coverage-option="premium"

            <header class="home-coverage-card__header">

              />

              <span aria-hidden="true"></span>
              <strong>ELIMINACI&Oacute;N DE FRANQUICIA</strong>

            </div>

            <div class="home-coverage-card__body">
              <ul class="home-coverage-card__features">

                <li><span class="home-coverage-card__feature-icon" aria-hidden="true"></span><span>Cobertura da&ntilde;os carrocer&iacute;a, lunas y ruedas</span></li>
                <li class="is-muted"><span class="home-coverage-card__feature-icon" aria-hidden="true"></span><span>Asistencia en carretera</span></li>
                <li class="is-muted"><span class="home-coverage-card__feature-icon" aria-hidden="true"></span><span>Servicio de telemedicina</span></li>
              </ul>

              <span class="home-coverage-card__details">Detalles</span>
            </div>

            <div class="home-coverage-card__price">
              <span>Descuento online</span>
              <div>
                <del>000,00&euro;</del>
                <strong class="home-coverage-card__discount">-10%</strong>
                
              </div>
              <strong>000,00&euro;<small>/d&iacute;a</small></strong>
            </div>
          </button>

          <button
            class="home-coverage-card"
            type="button"
            role="radio"
            aria-checked="false"
            data-home-coverage-option="super"
          >
            <span class="home-coverage-card__badge">M&Aacute;S COMPLETA</span>
            <header class="home-coverage-card__header">
              <span class="home-coverage-card__radio" aria-hidden="true"></span>
              <span class="home-coverage-card__title-stack">
                <h3>Super Premium Cover</h3>
              </span>
              <img
                class="home-coverage-card__shield"
                src="./assets/ico-shield3.svg"
                data-icon-default="./assets/ico-shield3.svg"
                data-icon-selected="./assets/ico-shield3-select.svg"

              />

            </header>

            <div class="home-coverage-card__tag home-coverage-card__tag--success">
              <span aria-hidden="true"></span>
              <strong>ELIMINACI&Oacute;N DE FRANQUICIA</strong>
              <i aria-hidden="true">i</i>
            </div>

            <div class="home-coverage-card__body">
              <ul class="home-coverage-card__features">
                <li><span class="home-coverage-card__feature-icon" aria-hidden="true"></span><span>Seguro de responsabilidad civil</span></li>
                <li><span class="home-coverage-card__feature-icon" aria-hidden="true"></span><span>Cobertura da&ntilde;os carrocer&iacute;a, lunas y ruedas</span></li>
                <li><span class="home-coverage-card__feature-icon" aria-hidden="true"></span><span>Asistencia en carretera</span></li>
                <li><span class="home-coverage-card__feature-icon" aria-hidden="true"></span><span>Servicio de telemedicina</span></li>

            </div>

            <div class="home-coverage-card__price">
              <span>Descuento online</span>

                <del>000,00&euro;</del>

              </div>
              <strong>000,00&euro;<small>/d&iacute;a</small></strong>
            </div>
          </button>
        </div>
      </section>
    </main>

    <script>
      const coverageOptions = document.querySelectorAll("[data-home-coverage-option]");

      function notifyParentResize() {
        const coverageModule = document.querySelector(".home-coverage");

        if (!coverageModule) {
          return;
        }

        const styles = window.getComputedStyle(coverageModule);
        const marginTop = Number.parseFloat(styles.marginTop) || 0;
        const marginBottom = Number.parseFloat(styles.marginBottom) || 0;
        const height = Math.ceil(
          coverageModule.getBoundingClientRect().height + marginTop + marginBottom
        );

        window.parent?.postMessage({ type: "ok-home-resize", height }, "*");
      }

      function syncCoverage(option) {
        coverageOptions.forEach((card) => {
          const isActive = card === option;
          const icon = card.querySelector(".home-coverage-card__shield");

          card.classList.toggle("is-selected", isActive);
          card.setAttribute("aria-checked", String(isActive));

          if (icon instanceof HTMLImageElement) {
            icon.src = isActive ? icon.dataset.iconSelected || icon.src : icon.dataset.iconDefault || icon.src;
          }
        });

        notifyParentResize();
      }

      coverageOptions.forEach((card) => {
        card.addEventListener("click", () => syncCoverage(card));
      });

      window.addEventListener("load", () => {
        notifyParentResize();
      });
    </script>
  </body>
</html>
